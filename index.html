<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório de Plantão</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #3d8bff;
    --accent2: #25d366;
    --text: #e8ecf5;
    --muted: #6b7590;
    --danger: #ff5c5c;
    --warn: #ffa84d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(61,139,255,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 2.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .logo {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
    box-shadow: 0 0 24px rgba(61,139,255,0.3);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  h1 span { color: var(--accent2); }

  .subtitle {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.2rem;
    transition: border-color 0.2s;
  }

  .card:focus-within {
    border-color: var(--accent);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.1rem;
  }

  .card-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
  }

  .icon-blue { background: rgba(61,139,255,0.15); }
  .icon-green { background: rgba(37,211,102,0.12); }
  .icon-orange { background: rgba(255,168,77,0.12); }
  .icon-red { background: rgba(255,92,92,0.12); }
  .icon-purple { background: rgba(167,139,250,0.12); }
  .icon-teal { background: rgba(45,212,191,0.12); }
  .icon-yellow { background: rgba(250,204,21,0.12); }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 0.35rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  input[type="text"], input[type="date"], textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    padding: 0.7rem 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: vertical;
  }

  input[type="text"]:focus, input[type="date"]:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(61,139,255,0.12);
  }

  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.6);
    cursor: pointer;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 0.9rem;
  }

  .field { margin-bottom: 0.9rem; }
  .field:last-child { margin-bottom: 0; }

  /* Dynamic list items */
  .list-group { display: flex; flex-direction: column; gap: 0.6rem; }

  .list-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .list-item input { flex: 1; }

  .btn-remove {
    width: 32px; height: 32px;
    flex-shrink: 0;
    background: rgba(255,92,92,0.1);
    border: 1px solid rgba(255,92,92,0.2);
    border-radius: 8px;
    color: var(--danger);
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }

  .btn-remove:hover { background: rgba(255,92,92,0.2); }

  .btn-add {
    background: rgba(61,139,255,0.08);
    border: 1px dashed rgba(61,139,255,0.35);
    border-radius: 10px;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.55rem 1rem;
    cursor: pointer;
    width: 100%;
    margin-top: 0.6rem;
    transition: background 0.2s, border-color 0.2s;
  }

  .btn-add:hover {
    background: rgba(61,139,255,0.15);
    border-color: var(--accent);
  }

  /* Saudação select */
  .greeting-row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 1rem;
    align-items: end;
    margin-bottom: 0.9rem;
  }

  select {
    padding: 0.7rem 0.8rem;
  }

  /* Footer / send */
  .send-area {
    margin-top: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .phone-row {
    display: flex;
    gap: 0.8rem;
    align-items: end;
  }

  .phone-row .field { flex: 1; margin: 0; }

  .btn-send {
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 1rem 2rem;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.03em;
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(37,211,102,0.3);
  }

  .btn-send:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(37,211,102,0.4);
  }

  .btn-send:active { transform: translateY(0); }

  .preview-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.8rem 1.5rem;
    cursor: pointer;
    width: 100%;
    transition: border-color 0.2s, color 0.2s;
  }

  .preview-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Preview modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center; justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    max-width: 560px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    margin-bottom: 1rem;
    color: var(--accent2);
  }

  .preview-text {
    background: var(--surface2);
    border-radius: 12px;
    padding: 1.2rem;
    font-size: 0.85rem;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--border);
    word-break: break-word;
  }

  .modal-actions {
    display: flex; gap: 0.8rem; margin-top: 1.2rem;
  }

  .modal-actions button { flex: 1; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0.5rem 0 1.2rem;
  }

  @media (max-width: 520px) {
    .row { grid-template-columns: 1fr; }
    .greeting-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">🛡️</div>
    <div>
      <h1>Relatório de <span>Plantão</span></h1>
      <div class="subtitle">Preencha e envie direto para o WhatsApp</div>
    </div>
  </header>

  <!-- Cabeçalho -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon icon-blue">📋</div>
      <span class="card-title">Cabeçalho</span>
    </div>
    <div class="greeting-row">
      <div class="field">
        <label>Saudação</label>
        <select id="greeting">
          <option>Bom dia</option>
          <option>Boa tarde</option>
          <option>Boa noite</option>
        </select>
      </div>
      <div class="field">
        <label>Tipo de Plantão</label>
        <select id="turno">
          <option>NOTURNO</option>
          <option>DIURNO</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Data do Plantão</label>
        <input type="date" id="data">
      </div>
      <div class="field">
        <label>Portaria / Local</label>
        <input type="text" id="local" placeholder="Ex: PORTARIAS, CONDOMÍNIO X...">
      </div>
    </div>
  </div>

  <!-- Faltas -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon icon-red">❌</div>
      <span class="card-title">Faltas</span>
    </div>
    <div class="list-group" id="faltas-list">
      <div class="list-item">
        <input type="text" placeholder="Ex: João Silva — falta justificada" value="Não houve.">
        <button class="btn-remove" onclick="removeItem(this)">×</button>
      </div>
    </div>
    <button class="btn-add" onclick="addItem('faltas-list', 'Ex: Nome — motivo')">+ Adicionar falta</button>
  </div>

  <!-- Folgas -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon icon-green">🌿</div>
      <span class="card-title">Folgas</span>
    </div>
    <div class="list-group" id="folgas-list">
      <div class="list-item">
        <input type="text" placeholder="Ex: Maria Silva, folga do mês X." value="Não houve.">
        <button class="btn-remove" onclick="removeItem(this)">×</button>
      </div>
    </div>
    <button class="btn-add" onclick="addItem('folgas-list', 'Ex: Nome, folga do mês X.')">+ Adicionar folga</button>
  </div>

  <!-- Atrasos -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon icon-orange">⏱️</div>
      <span class="card-title">Atrasos</span>
    </div>
    <div class="list-group" id="atrasos-list">
      <div class="list-item">
        <input type="text" placeholder="Ex: Carlos Lima — 15 min" value="Não houve.">
        <button class="btn-remove" onclick="removeItem(this)">×</button>
      </div>
    </div>
    <button class="btn-add" onclick="addItem('atrasos-list', 'Ex: Nome — tempo de atraso')">+ Adicionar atraso</button>
  </div>

  <!-- Observações Gerais -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon icon-purple">📝</div>
      <span class="card-title">Observações Gerais</span>
    </div>
    <div class="list-group" id="obs-list">
      <div class="list-item">
        <input type="text" placeholder="Ex: Fulano fez F.T no local X.">
        <button class="btn-remove" onclick="removeItem(this)">×</button>
      </div>
    </div>
    <button class="btn-add" onclick="addItem('obs-list', 'Ex: Observação...')">+ Adicionar observação</button>
  </div>

  <!-- Ocorrências -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon icon-red">🚨</div>
      <span class="card-title">Ocorrências no Plantão</span>
    </div>
    <div class="list-group" id="ocorrencias-list">
      <div class="list-item">
        <input type="text" placeholder="Ex: Ocorrência registrada..." value="Sem novidades.">
        <button class="btn-remove" onclick="removeItem(this)">×</button>
      </div>
    </div>
    <button class="btn-add" onclick="addItem('ocorrencias-list', 'Ex: Descreva a ocorrência...')">+ Adicionar ocorrência</button>
  </div>

  <!-- Sobre o plantão -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon icon-teal">💬</div>
      <span class="card-title">Sobre o Plantão Diurno</span>
    </div>
    <div class="list-group" id="sobre-list">
      <div class="list-item">
        <input type="text" placeholder="Ex: Informação sobre o plantão diurno...">
        <button class="btn-remove" onclick="removeItem(this)">×</button>
      </div>
    </div>
    <button class="btn-add" onclick="addItem('sobre-list', 'Ex: Informação...')">+ Adicionar informação</button>
  </div>

  <!-- Próximo plantão -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon icon-yellow">🌙</div>
      <span class="card-title">Para o Próximo Plantão</span>
    </div>
    <div class="field">
      <label>Data do próximo plantão</label>
      <input type="date" id="data-prox">
    </div>
    <div class="divider"></div>
    <div class="list-group" id="proximo-list">
      <div class="list-item">
        <input type="text" placeholder="Ex: Alexandre Dias (volante) estará de plantão no Liber 1000.">
        <button class="btn-remove" onclick="removeItem(this)">×</button>
      </div>
    </div>
    <button class="btn-add" onclick="addItem('proximo-list', 'Ex: Nome (função) estará de plantão em...')">+ Adicionar escala</button>
  </div>

  <!-- Envio -->
  <div class="send-area">
    <div class="phone-row">
      <div class="field">
        <label>Número do WhatsApp (com DDI)</label>
        <input type="text" id="phone" placeholder="Ex: 5511999999999" maxlength="15">
      </div>
    </div>
    <button class="preview-btn" onclick="openPreview()">👁 Pré-visualizar mensagem</button>
    <button class="btn-send" onclick="sendWhatsApp()">
      <span>📲</span> Enviar pelo WhatsApp
    </button>
  </div>
</div>

<!-- Modal preview -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>📋 Pré-visualização</h2>
    <div class="preview-text" id="preview-content"></div>
    <div class="modal-actions">
      <button class="preview-btn" onclick="closeModal()">Fechar</button>
      <button class="btn-send" onclick="sendWhatsApp(); closeModal()">Enviar</button>
    </div>
  </div>
</div>

<script>
  // Inicializa data de hoje
  const today = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  document.getElementById('data').value = fmt(today);
  const tomorrow = new Date(today);
  tomorrow.setDate(today.getDate() + 1);
  document.getElementById('data-prox').value = fmt(tomorrow);

  function addItem(listId, placeholder) {
    const list = document.getElementById(listId);
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `
      <input type="text" placeholder="${placeholder}">
      <button class="btn-remove" onclick="removeItem(this)">×</button>
    `;
    list.appendChild(div);
    div.querySelector('input').focus();
  }

  function removeItem(btn) {
    const item = btn.closest('.list-item');
    const list = item.parentElement;
    if (list.children.length > 1) {
      item.remove();
    } else {
      item.querySelector('input').value = '';
    }
  }

  function getItems(listId) {
    const items = [];
    document.querySelectorAll(`#${listId} .list-item input`).forEach(inp => {
      const val = inp.value.trim();
      if (val) items.push(val);
    });
    return items;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}`;
  }

  function buildMessage() {
    const greeting = document.getElementById('greeting').value;
    const turno = document.getElementById('turno').value;
    const data = formatDate(document.getElementById('data').value);
    const local = document.getElementById('local').value.trim() || 'PORTARIAS';
    const dataProx = formatDate(document.getElementById('data-prox').value);

    const bullet = item => `- ${item}`;

    const faltas = getItems('faltas-list');
    const folgas = getItems('folgas-list');
    const atrasos = getItems('atrasos-list');
    const obs = getItems('obs-list');
    const ocorrencias = getItems('ocorrencias-list');
    const sobre = getItems('sobre-list');
    const proximo = getItems('proximo-list');

    let msg = `${greeting} a todos.\n`;
    msg += `STATUS PLANTÃO ${turno} ${local}  ${data}.\n`;
    msg += `\nFALTAS:\n${faltas.map(bullet).join('\n') || '- Não houve.'}\n`;
    msg += `\nFOLGAS:\n${folgas.map(bullet).join('\n') || '- Não houve.'}\n`;
    msg += `\nATRASOS:\n${atrasos.map(bullet).join('\n') || '- Não houve.'}\n`;

    if (obs.length > 0) {
      msg += `\nOBSERVAÇÕES GERAIS:\n${obs.map(bullet).join('\n')}\n`;
    }

    msg += `\nOCORRENCIAS NO PLANTÃO:\n${ocorrencias.map(bullet).join('\n') || '- Sem novidades.'}\n`;

    if (sobre.length > 0 && sobre[0] !== '') {
      msg += `\nSOBRE O PLANTÃO DIURNO:\n${sobre.map(bullet).join('\n')}\n`;
    }

    if (proximo.length > 0 && proximo[0] !== '') {
      const label = dataProx ? `PARA O PLANTÃO ${turno} DIA ${dataProx}` : `PARA O PRÓXIMO PLANTÃO ${turno}`;
      msg += `\n${label}\n${proximo.map(bullet).join('\n')}`;
    }

    return msg;
  }

  function openPreview() {
    document.getElementById('preview-content').textContent = buildMessage();
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function sendWhatsApp() {
    const phone = document.getElementById('phone').value.replace(/\D/g, '');
    const msg = buildMessage();
    const encoded = encodeURIComponent(msg);
    const url = phone
      ? `https://wa.me/${phone}?text=${encoded}`
      : `https://wa.me/?text=${encoded}`;
    window.open(url, '_blank');
  }

  // Fechar modal ao clicar fora
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
